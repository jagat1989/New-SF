# ============================================================================
#  Special Fare — Nginx reverse proxy config
#  This is a reference template. deploy.sh generates this automatically.
#
#  Manual setup:
#    sudo cp deploy/nginx.conf /etc/nginx/sites-available/special-fare
#    sudo ln -s /etc/nginx/sites-available/special-fare /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

server {
    listen 80;
    server_name specialfare.com www.specialfare.com;

    client_max_body_size 10M;

    # Reverse proxy to the Next.js standalone Node server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Serve Next.js static assets directly via Nginx (bypasses Node — faster)
    location /_next/static/ {
        alias /var/www/special-fare/.next/standalone/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        alias /var/www/special-fare/.next/standalone/public/favicon.ico;
        access_log off;
    }
}

# After certbot runs, it will add a second server block for 443/SSL automatically.
